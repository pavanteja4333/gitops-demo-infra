apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default
  source:
    # URL of the gitops-infra-repo. When setting up in GitHub, replace this with your actual GitHub repo URL.
    # For local test files, you can also point to a local Git server or folder accessible from the cluster.
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/gitops-infra-repo.git'
    targetRevision: HEAD
    path: helm/app-chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Automatically create the namespace if it doesn't exist
      - CreateNamespace=true
