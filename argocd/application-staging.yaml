apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pavanteja4333/gitops-demo-infra.git'
    targetRevision: HEAD
    path: helm/app-chart
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo-app-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
